<div class="animated fadeIn">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
          <h4 style="margin: 0; color: var(--color-text-primary); font-family: 'Cormorant Garamond', serif; font-size: 1.8rem;">Perfiles</h4>
          <div class="header-actions">
            <button type="button" class="btn-serene-primary" style="border-radius: 30px; padding: 0.5rem 1.25rem; font-size: 0.85rem; text-transform: uppercase;" (click)="addRol()">
              + Nuevo Perfil
            </button>
          </div>
        </div>

        @if (loadingRoles) {
          <div class="box-loading-skeleton" style="margin-bottom: 1.5rem;">
            <div class="skeleton-line" style="width: 30%; height: 24px; margin-bottom: 12px;"></div>
            <div class="skeleton-line" style="width: 100%; height: 80px; margin-bottom: 12px; border-radius: 8px;"></div>
            <div class="skeleton-line" style="width: 100%; height: 80px; margin-bottom: 12px; border-radius: 8px;"></div>
          </div>
        } @else {
          @for (r of roles; track r.id) {
            <div class="sale-day-card" style="margin-bottom: 1.5rem;">
              <div class="sale-day-header">
                <div>
                  <span class="client-name" style="text-transform: uppercase;">{{ r.name }}</span>
                </div>
                <div style="font-size: 0.85rem; color: var(--color-text-muted);">
                  Identificador: {{ r.slug || 'N/A' }}
                </div>
              </div>
              <div class="sale-item-detail">
                <div class="detail-grid" style="display: flex; justify-content: space-between; align-items: center;">
                  <div class="col-flex" style="flex: 2;">
                    <span style="display:block; color:var(--color-text-muted); font-size: 0.8rem;">Descripción</span>
                    <strong style="font-weight: 400; color: var(--color-text-primary);">{{ r.description || 'Sin descripción' }}</strong>
                  </div>
                  
                  <div class="col-flex text-center" style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                    <button type="button" class="btn-serene-icon-primary" title="Editar" (click)="editRol(r)">
                      <i class="fa fa-edit"></i>
                    </button>
                    <button type="button" class="btn-serene-icon-danger" title="Eliminar" (click)="deleteRol(r)">
                      <i class="fa fa-trash"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          }
          
          @if (roles.length === 0) {
            <div class="text-center" style="padding: 4rem 2rem; background: var(--color-surface); border-radius: 12px; box-shadow: 0 4px 12px rgba(58, 74, 64, 0.05); border: 1px solid rgba(0,0,0,0.03);">
              <i class="fas fa-id-card" style="font-size: 3rem; color: var(--color-text-muted); opacity: 0.5; margin-bottom: 1rem;"></i>
              <h5 style="color: var(--color-text-primary); font-weight: 500; font-family: 'Outfit', sans-serif;">Sin perfiles</h5>
              <p style="color: var(--color-text-muted); margin: 0;">No se encontraron perfiles registrados.</p>
            </div>
          }
        }
      </div>
    </div>
  </div>
</div>
