<div class="animated fadeIn">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h4 style="margin: 0; color: var(--color-text-primary); font-family: 'Cormorant Garamond', serif; font-size: 1.8rem;">
          {{ isEdit ? 'Editar Perfil' : 'Nuevo Perfil' }}
        </h4>
        <div class="header-actions">
          <button type="button" class="btn-serene-secondary" style="border-radius: 30px; padding: 0.5rem 1.25rem; font-size: 0.85rem; text-transform: uppercase;" (click)="cancel()">
            &larr; Volver
          </button>
        </div>
      </div>

      <form #rolForm="ngForm" (ngSubmit)="saveRol()">
        <div class="sale-day-card" style="margin-bottom: 1.5rem; padding: 2rem;">
          
          <h5 style="color: var(--color-primary); font-family: var(--font-body); font-weight: 500; font-size: 1.1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--color-border); padding-bottom: 0.75rem;">
            Datos del Perfil
          </h5>
          
          <div class="row">
            <div class="col-lg-6" style="margin-bottom: 1rem;">
              <label class="form-label" style="color: var(--color-text-muted); font-size: 0.85rem;">Nombre</label>
              <input type="text" class="serene-input" name="name" [(ngModel)]="rol.name" #name="ngModel" placeholder="Ej. Administrador" required />
            </div>
            <div class="col-lg-6" style="margin-bottom: 1rem;">
              <label class="form-label" style="color: var(--color-text-muted); font-size: 0.85rem;">Identificador (Slug)</label>
              <input type="text" class="serene-input" name="slug" [(ngModel)]="rol.slug" #slug="ngModel" placeholder="Ej. admin" required />
            </div>
          </div>
          
          <div class="row">
            <div class="col-lg-12" style="margin-bottom: 1rem;">
              <label class="form-label" style="color: var(--color-text-muted); font-size: 0.85rem;">Descripción</label>
              <textarea class="serene-input" name="description" [(ngModel)]="rol.description" #description="ngModel" placeholder="Opcional"></textarea>
            </div>
          </div>
          
          <h5 style="color: var(--color-primary); font-family: var(--font-body); font-weight: 500; font-size: 1.1rem; margin-top: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--color-border); padding-bottom: 0.75rem;">
            Matriz de Permisos
          </h5>
          
          @if (loading) {
            <div class="text-center" style="padding: 2rem;">Cargando permisos...</div>
          } @else {
            <div class="permissions-container" style="padding-right: 0.5rem;">
              @for (group of groupedPermissions; track group.module) {
                <div class="permission-group" style="margin-bottom: 1.5rem; background: #fbfbfb; border: 1px solid var(--color-border); border-radius: 12px; padding: 1.5rem;">
                  <h6 style="color: var(--color-primary); font-family: var(--font-body); font-weight: 500; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px dashed rgba(132, 165, 157, 0.3); padding-bottom: 0.5rem; margin-bottom: 1rem;">
                    {{ group.module }}
                  </h6>
                  <div class="row">
                    @for (perm of group.perms; track perm.id) {
                      <div class="col-md-4 col-sm-6" style="margin-bottom: 1rem;">
                        <label class="serene-checkbox-label" style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
                          <input type="checkbox" [checked]="isPermissionSelected(perm.id!)" (change)="togglePermission(perm)" style="accent-color: var(--color-primary); width: 18px; height: 18px; cursor: pointer;">
                          <span style="font-size: 0.9rem; color: var(--color-text-primary);">{{ formatPermissionName(perm.name || perm.slug!) }}</span>
                        </label>
                      </div>
                    }
                  </div>
                </div>
              }
            </div>
          }
          
          <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem; border-top: 1px solid var(--color-border); padding-top: 1.5rem;">
            <button type="button" class="btn-serene-secondary" (click)="cancel()">Cancelar</button>
            <button type="submit" class="btn-serene-primary" [disabled]="rolForm.invalid || loading">
              Guardar Perfil
            </button>
          </div>
          
        </div>
      </form>
      
    </div>
  </div>
</div>
