<div class="animated fadeIn">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <!-- Header -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h4 style="margin: 0; color: var(--color-text-primary); font-family: 'Cormorant Garamond', serif; font-size: 1.8rem;">
          Catálogo de Conceptos
        </h4>
        <div style="display: flex; gap: 1rem; align-items: center;">
          <div style="position: relative;">
            <input class="serene-input" placeholder="Buscar concepto..." name="shared" [(ngModel)]="filters.name" (keyup)="filterName($event)" style="padding-right: 2rem;" />
            @if (filters.name !== '') {
              <button class="btn-serene-icon-danger" style="position: absolute; right: 5px; top: 5px; padding: 2px 6px;" (click)="filters.name = '';getCatlog()" title="Limpiar búsqueda">
                <i class="fa fa-times"></i>
              </button>
            }
          </div>
          <button type="button" class="btn-serene-primary" (click)="addItem()">
            Nuevo Concepto
          </button>
        </div>
      </div>

      <!-- Content -->
      <div>
        @if (loading) {
          <div class="box-loading-skeleton" style="margin-bottom: 1.5rem;">
            <div class="skeleton-line" style="width: 30%; height: 24px; margin-bottom: 16px;"></div>
            <div class="skeleton-line" style="width: 100%; height: 60px; margin-bottom: 12px; border-radius: 8px;"></div>
            <div class="skeleton-line" style="width: 100%; height: 60px; margin-bottom: 12px; border-radius: 8px;"></div>
            <div class="skeleton-line" style="width: 100%; height: 60px; border-radius: 8px;"></div>
          </div>
        } @else {
          @if (catalog.length === 0) {
            <div style="text-align: center; padding: 3rem; color: var(--color-text-muted);">
              No se encontraron conceptos.
            </div>
          }

          @for (c of catalog; track c.id) {
            <div class="sale-day-card" style="margin-bottom: 0.75rem; padding: 1rem 1.5rem;">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="flex: 1;">
                  <span class="client-name" style="font-size: 1.1rem;">{{ c.name }}</span>
                </div>
                <!-- Some catalogs have price, but concepts might not. Left it commented out just in case
                <div style="flex: 1; text-align: right; padding-right: 2rem;">
                  <span class="price-value">{{ c.price | currency:'MXN ':'symbol':'1.2-2' }}</span>
                </div>
                -->
                <div style="display: flex; gap: 0.75rem;">
                  <button class="btn-serene-icon-primary" title="Editar" (click)="updateItem(c)">
                    <i class="fa fa-edit"></i>
                  </button>
                  <button class="btn-serene-icon-danger" title="Eliminar" (click)="deleteItem(c)">
                    <i class="fa fa-trash"></i>
                  </button>
                </div>
              </div>
            </div>
          }
        }
      </div>

      <!-- Pagination -->
      <div style="padding: 1rem 0; display: flex; justify-content: center;">
        <pagination 
          [boundaryLinks]="true" 
          [totalItems]="paginate.total || 0" 
          [maxSize]="9" 
          [itemsPerPage]="filters.perPage"  
          (pageChanged)="pageChanged($event)"
          previousText="&lsaquo;" 
          nextText="&rsaquo;" 
          firstText="&laquo;" 
          lastText="&raquo;">
        </pagination>
      </div>

    </div>
  </div>
</div>

<!-- Modal Nativo -->
<div class="sc-modal-overlay" [class.active]="showModal" (click)="closeModal()">
  <div class="sc-modal-panel" (click)="$event.stopPropagation()">
    <form #form="ngForm" (ngSubmit)="save()">
      <div class="sc-modal-header">
        <h4 class="sc-modal-title">{{ isEdit ? 'Editar Concepto' : 'Nuevo Concepto' }}</h4>
        <button type="button" class="sc-close-btn" (click)="closeModal()">✕</button>
      </div>
      
      <div class="sc-modal-body">
        <div class="row">
          <div class="col-12" style="margin-bottom: 1rem;">
            <label class="form-label" style="color: var(--color-text-muted); font-size: 0.85rem;">Nombre del concepto</label>
            <input class="serene-input" placeholder="Ej. Depilación" name="name" [(ngModel)]="item.name" #name="ngModel" required>
          </div>
          <!-- Not showing price since it usually doesn't apply to pure abstract concepts unless it's a product/service, but left the form structure clean -->
        </div>
      </div>
      
      <div class="sc-modal-footer">
        <button type="button" class="sc-btn sc-btn-ghost" (click)="closeModal()">Cancelar</button>
        <button type="submit" class="sc-btn sc-btn-primary" [disabled]="form.invalid">Guardar</button>
      </div>
    </form>
  </div>
</div>
