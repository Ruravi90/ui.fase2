<div class="schedule-page">
  <!-- Header -->
  <div class="schedule-header">
    <div>
      <h2 class="schedule-title">Agenda</h2>
      <p class="schedule-subtitle">Haz clic en cualquier espacio para crear una cita · Arrastra para reagendar</p>
    </div>
    <!-- Buscador por cliente -->
    <div class="sched-search-wrap">
      <i class="fas fa-search sched-search-icon"></i>
      <input
        id="sched-client-search"
        type="text"
        class="sched-search-input"
        placeholder="Filtrar por cliente..."
        [value]="searchTerm"
        (input)="onSearch($any($event.target).value)">
      @if (searchTerm) {
        <button class="sched-search-clear" type="button" (click)="clearSearch()" title="Limpiar">
          <i class="fas fa-times"></i>
        </button>
      }
    </div>
  </div>

  <!-- Calendar -->
  <div class="calendar-card">
    <full-calendar *ngIf="calendarOptions" [options]="calendarOptions"></full-calendar>
  </div>
</div>

<!-- ===== MODAL OVERLAY ===== -->
<div class="sc-modal-overlay" [class.active]="showModal" (click)="closeModal()">
  <div class="sc-modal-panel" (click)="$event.stopPropagation()">

    <!-- Modal Header -->
    <div class="sc-modal-header">
      <h4 class="sc-modal-title">{{ formData.id ? 'Editar Cita' : 'Nueva Cita' }}</h4>
      <button class="sc-close-btn" (click)="closeModal()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="sc-modal-body">
      <div class="sc-form-group">
        <label class="sc-label">Servicio / Título *</label>
        <input
          type="text"
          class="sc-input"
          [(ngModel)]="formData.title"
          placeholder="Ej. Masaje Relajante"
          autocomplete="off"
        >
      </div>

      <div class="sc-form-group">
        <label class="sc-label">Cliente</label>
        <ng-select
          [items]="clients"
          bindLabel="fullname"
          bindValue="id"
          [(ngModel)]="formData.client_id"
          (change)="onClientChange(formData.client_id || 0)"
          placeholder="Buscar cliente..."
          [clearable]="true"
          class="sc-ng-select"
        ></ng-select>
        <span class="sc-hint">Se enviará aviso de WhatsApp al guardar.</span>
      </div>

      <div class="sc-form-group" *ngIf="clientPackages && clientPackages.length > 0">
        <label class="sc-label">Aplicar a Paquete (Opcional)</label>
        <ng-select
          [items]="clientPackages"
          bindLabel="type.name"
          bindValue="id"
          [(ngModel)]="formData.package_id"
          (change)="onPackageChange(formData.package_id || 0)"
          placeholder="Selecciona un paquete activo..."
          [clearable]="true"
          class="sc-ng-select"
        ></ng-select>
        <span class="sc-hint">El título se autocompletará si seleccionas un paquete.</span>
      </div>

      <div class="sc-form-group">
        <label class="sc-label">Descripción (opcional)</label>
        <textarea
          class="sc-input"
          [(ngModel)]="formData.description"
          placeholder="Notas adicionales..."
          rows="2"
        ></textarea>
      </div>

      <div class="sc-row">
        <div class="sc-form-group">
          <label class="sc-label">Inicio</label>
          <input type="datetime-local" class="sc-input" [(ngModel)]="formData.start">
        </div>
        <div class="sc-form-group">
          <label class="sc-label">Fin</label>
          <input type="datetime-local" class="sc-input" [(ngModel)]="formData.end">
        </div>
      </div>

      <div class="sc-form-group">
        <label class="sc-label">Color</label>
        <div class="sc-color-picker">
          <button
            *ngFor="let c of ['#a2d2ff','#ffc8dd','#bde0fe','#ffadad','#fdffb6','#caffbf','#c9b1ff','#ffd6a5']"
            class="sc-color-dot"
            [style.background]="c"
            [class.selected]="formData.color === c"
            (click)="formData.color = c"
            type="button"
          ></button>
        </div>
      </div>
    </div>

    <!-- Modal Footer -->
    <div class="sc-modal-footer">
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <button *ngIf="formData.id" type="button" class="sc-btn sc-btn-danger" (click)="deleteEvent()">
          Eliminar
        </button>
        <button *ngIf="formData.id && formData.package_id && !isTaken" type="button" class="sc-btn" style="background: #e9ecef; color: #495057; border: none; font-weight: 500;" (click)="confirmCheckIn()">
          Confirmar Asistencia
        </button>
        <span *ngIf="formData.id && formData.package_id && isTaken" style="color: #27ae60; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.25rem;">
          <i class="fas fa-check-circle"></i> Asistencia confirmada
        </span>
      </div>
      <div class="sc-footer-right">
        <button type="button" class="sc-btn sc-btn-ghost" (click)="closeModal()">Cancelar</button>
        <button type="button" class="sc-btn sc-btn-primary" [disabled]="!formData.title" (click)="saveEvent()">
          {{ formData.id ? 'Guardar cambios' : 'Agendar' }}
        </button>
      </div>
    </div>

  </div>
</div>
