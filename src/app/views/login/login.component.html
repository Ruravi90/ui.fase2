<div class="login-container">
  <div class="login-visual">
    <div class="visual-content">
      <h2>Bienestar y Tranquilidad</h2>
      <p>Bienvenido a Fase 2 Spa. Tu espacio de relajación y cuidado personal.</p>
    </div>
    <div class="visual-gradient-orb"></div>
  </div>
  
  <div class="login-form-container">
    <form class="login-form" #loginForm="ngForm" (submit)="login()">
      <div class="form-header">
        <h1>Fase 2 Spa</h1>
        <p class="subtitle">Ingresa a tu cuenta</p>
      </div>

      <div class="serene-input-group">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <input type="text" id="username" placeholder="Tu nombre de usuario" [(ngModel)]="user.username" #username="ngModel" name="username" required>
        </div>
      </div>

      <div class="serene-input-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Tu contraseña" [(ngModel)]="user.password" #password="ngModel" name="password" required>
        </div>
      </div>

      @if (isAuthorized == false) {
        <div class="error-message">
          <span>Usuario o contraseña incorrecta</span>
        </div>
      }

      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="isBusy || loginForm.invalid">
          @if (isBusy) {
            <span class="spinner"></span>
          } @else {
            <span>Iniciar sesión</span>
          }
        </button>
        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
      </div>
    </form>
  </div>
</div>
